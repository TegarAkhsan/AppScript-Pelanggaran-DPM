<!-- Form Input (Kiri) - Hanya Admin yang bisa melihat -->
<div id="inputSection" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-1 h-fit">
    <h3 class="text-lg font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100">Input Pelanggaran Baru</h3>
    
    <form id="formPelanggaran" onsubmit="event.preventDefault(); simpan();" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Nama Fungsionaris <span class="text-red-500">*</span></label>
            <select id="nama" required onchange="updateJabatan()" 
                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white text-sm">
                <option value="" disabled selected>-- Pilih Nama --</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Jabatan <span class="text-red-500">*</span></label>
            <input type="text" id="jabatan" readonly placeholder="Jabatan akan terisi otomatis" 
                class="w-full px-4 py-2 rounded-lg border border-slate-200 bg-slate-50 text-slate-500 outline-none transition cursor-not-allowed">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Jenis Pelanggaran <span class="text-red-500">*</span></label>
            <select id="jenis" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white text-sm">
                <option value="" disabled selected>-- Memuat Jenis Pelanggaran --</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Keterangan Tambahan / Kronologi</label>
            <textarea id="keterangan" rows="3" placeholder="Tuliskan detail kejadian..." 
                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"></textarea>
        </div>

        <button type="submit" id="btnSimpan" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition shadow-md flex justify-center items-center gap-2">
            <span>Simpan Data</span>
        </button>
        
        <div id="statusAlert" class="hidden text-center text-sm font-medium p-2 rounded-lg mt-2"></div>
    </form>
</div>
