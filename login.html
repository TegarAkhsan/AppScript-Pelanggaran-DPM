<!-- HALAMAN LOGIN -->
<div id="loginPage" class="flex min-h-screen items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg border border-slate-200 w-full max-w-md">
        <div class="flex justify-center mb-6">
            <div class="bg-yellow-500 w-16 h-16 rounded-full flex items-center justify-center text-white font-bold text-2xl shadow-md">
                DPM
            </div>
        </div>
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Portal DPM Vokasi</h2>
        <p class="text-center text-slate-500 mb-8 text-sm">Silakan masuk untuk mengakses Sistem Pelanggaran</p>

        <form id="formLogin" onsubmit="event.preventDefault(); prosesLogin();" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Username</label>
                <input type="text" id="loginUser" required placeholder="Masukkan Username" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="loginPass" required placeholder="Masukkan Password" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition pr-12">
                    <!-- Tombol Show/Hide Password -->
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-blue-600 focus:outline-none transition-colors">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <div id="loginAlert" class="hidden text-sm text-red-600 bg-red-100 p-3 rounded-lg text-center font-medium"></div>

            <button type="submit" id="btnLogin" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md flex justify-center items-center gap-2">
                <span>Masuk</span>
            </button>
        </form>
    </div>
</div>
