<script>
    // FUNGSI TOGGLE PASSWORD
    function togglePassword() {
        const passInput = document.getElementById('loginPass');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
        } else {
            passInput.type = 'password';
            eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
        }
    }

    let currentUser = null;
    const INACTIVITY_TIMEOUT = 20 * 60 * 1000; // 20 Menit dalam milidetik

    // FUNGSI UPDATE AKTIVITAS TERAKHIR
    function updateLastActivity() {
        if (!currentUser) return;
        localStorage.setItem('lastActivity', Date.now());
    }

    // FUNGSI CEK SESI
    function checkSession() {
        if (!currentUser) return;
        const lastActivity = localStorage.getItem('lastActivity');
        if (lastActivity && (Date.now() - lastActivity > INACTIVITY_TIMEOUT)) {
            console.log("Sesi berakhir karena tidak ada aktivitas.");
            logout();
            alert("Sesi Anda telah berakhir. Silakan login kembali.");
        }
    }

    // EVENT LISTENERS UNTUK TRACK AKTIVITAS
    ['mousemove', 'keydown', 'click', 'scroll'].forEach(event => {
        window.addEventListener(event, updateLastActivity);
    });

    // Cek sesi setiap 30 detik
    setInterval(checkSession, 30000);

    // FUNGSI LOGIN & AUTENTIKASI
    function prosesLogin() {
        const btn = document.getElementById("btnLogin");
        const user = document.getElementById("loginUser").value;
        const pass = document.getElementById("loginPass").value;
        const alertBox = document.getElementById("loginAlert");

        btn.disabled = true;
        btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memverifikasi...`;
        alertBox.classList.add("hidden");

        if (typeof google !== 'undefined' && google.script) {
            google.script.run
                .withSuccessHandler(function(response) {
                    handleLoginResponse(response);
                })
                .verifikasiLogin(user, pass);
        } else {
            handleLoginResponse({role: 'admin', username: 'MKEDPM'});
        }
    }

    function handleLoginResponse(response) {
        const btn = document.getElementById("btnLogin");
        const alertBox = document.getElementById("loginAlert");

        btn.disabled = false;
        btn.innerHTML = `<span>Masuk</span>`;

        if (!response) {
            alertBox.innerText = "Username atau Password salah!";
            alertBox.classList.remove("hidden");
            return;
        }

        currentUser = response;
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");

        const adminControls = document.getElementById("adminControls");
        const roleBadge = document.getElementById("roleBadge");
        const userNameDisplay = document.getElementById("userNameDisplay");

        userNameDisplay.innerText = currentUser.username;

        if (currentUser.role === 'admin') {
            roleBadge.innerText = "MKE DPM (Admin)";
            roleBadge.classList.replace("text-blue-600", "text-yellow-600");
            adminControls.classList.remove("hidden");
            document.getElementById("tableWrapper").classList.replace("lg:col-span-3", "lg:col-span-2");
        } else {
            roleBadge.innerText = "Fungsionaris";
            roleBadge.classList.replace("text-yellow-600", "text-blue-600");
            adminControls.classList.add("hidden");
            document.getElementById("tableWrapper").classList.replace("lg:col-span-2", "lg:col-span-3");
        }

        loadData();
        loadFungsionaris();
        loadJenisPelanggaran();
        loadSanksi();
        updateLastActivity(); // Set aktivitas awal saat login
    }

    let listSanksi = [];
    function loadSanksi() {
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(data) {
                listSanksi = data;
                // Re-render if data already exists
                loadData();
            }).getSanksiList();
        }
    }

    function getSanksiByPoin(total) {
        let currentSanksi = { jenis: "Aman", deskripsi: "Tidak ada sanksi" };
        listSanksi.forEach(s => {
            const p = s.poin;
            if (p.includes("-")) {
                const range = p.split("-").map(Number);
                if (total >= range[0] && total <= range[1]) currentSanksi = s;
            } else if (p.startsWith(">=")) {
                const min = parseInt(p.replace(">=", ""));
                if (total >= min) currentSanksi = s;
            } else if (!isNaN(p) && parseInt(p) === total) {
                currentSanksi = s;
            }
        });
        return currentSanksi;
    }

    // UPDATE MY STATUS (Removed as per user request)
    function updateMyStatus(allData) {
        // This section is no longer used
    }

    function renderLeaderboard(data) {
        const container = document.getElementById("leaderboardContainer");
        if (!data || data.length <= 1) {
            container.innerHTML = `<div class="col-span-full py-8 text-center text-slate-400 italic">Belum ada data untuk leaderboard.</div>`;
            return;
        }

        const totals = {};
        data.forEach((row, index) => {
            if (index > 0) {
                const nama = row[1];
                const poin = parseInt(row[4] || 0);
                if (!totals[nama]) totals[nama] = { nama: nama, poin: 0, jabatan: row[2] };
                totals[nama].poin += poin;
            }
        });

        const sorted = Object.values(totals).sort((a, b) => b.poin - a.poin).slice(0, 6);
        let html = "";
        
        sorted.forEach((user, i) => {
            const sanksi = getSanksiByPoin(user.poin);
            let badgeColor = "bg-slate-100 text-slate-600";
            if (i === 0) badgeColor = "bg-red-500 text-white shadow-sm ring-4 ring-red-100";
            else if (i === 1) badgeColor = "bg-orange-500 text-white shadow-sm ring-4 ring-orange-100";
            else if (i === 2) badgeColor = "bg-yellow-500 text-white shadow-sm ring-4 yellow-orange-100";

            html += `
                <div class="bg-slate-50 border border-slate-200 p-4 rounded-xl flex items-center gap-4 transition hover:shadow-md hover:bg-white">
                    <div class="w-10 h-10 rounded-full ${badgeColor} flex items-center justify-center font-black text-lg">
                        ${i + 1}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-bold text-slate-800 truncate">${user.nama}</h4>
                        <p class="text-xs text-slate-500 truncate">${user.jabatan}</p>
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700">${user.poin} POIN</span>
                            <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 truncate">${sanksi.jenis || "Aman"}</span>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html || `<div class="col-span-full py-8 text-center text-slate-400 italic">Data leaderboard masih kosong.</div>`;
    }

    function renderTable(data) {
        const tbody = document.getElementById("tabelBody");
        let html = "";
        if(!data || data.length <= 1){
            tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-6 text-center text-slate-500 italic">Belum ada data pelanggaran.</td></tr>`;
            return;
        }

        // updateMyStatus(data); // Removed summary section update
        renderLeaderboard(data);

        for(let i = data.length - 1; i >= 1; i--){
            let row = data[i];
            let tglRaw = new Date(row[6]);
            let tglFormat = tglRaw.toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'});
            if(tglFormat === "Invalid Date") tglFormat = row[6] || "-";
            let poin = parseInt(row[4]);
            let poinColor = "bg-yellow-100 text-yellow-800";
            if(poin >= 8) poinColor = "bg-red-100 text-red-800 font-bold";
            else if(poin >= 4) poinColor = "bg-orange-100 text-orange-800";
            html += `<tr class="hover:bg-slate-50 transition border-b border-slate-50">
                        <td class="px-4 py-3 whitespace-nowrap text-slate-500">${tglFormat}</td>
                        <td class="px-4 py-3 font-medium text-slate-800">${row[1]}</td>
                        <td class="px-4 py-3 text-slate-600">${row[2]}</td>
                        <td class="px-4 py-3 text-slate-600 max-w-xs truncate" title="${row[3]}">${row[3]}</td>
                        <td class="px-4 py-3 text-center">
                            <span class="px-2.5 py-1 rounded-full text-xs ${poinColor}">${row[4]}</span>
                        </td>
                        <td class="px-4 py-3 text-slate-500 text-sm max-w-xs truncate" title="${row[5]}">${row[5] || "-"}</td>
                     </tr>`;
        }
        tbody.innerHTML = html || `<tr><td colspan="6" class="px-4 py-6 text-center text-slate-500 italic">Belum ada riwayat pelanggaran.</td></tr>`;
    }

    let listFungsionaris = [];
    function loadFungsionaris() {
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(data) {
                listFungsionaris = data;
                const select = document.getElementById("nama");
                if (!select) return;
                select.innerHTML = '<option value="" disabled selected>-- Pilih Nama --</option>';
                data.forEach(item => {
                    let option = document.createElement("option");
                    option.value = item.nama; option.text = item.nama;
                    select.appendChild(option);
                });
            }).getFungsionarisList();
        }
    }

    function loadJenisPelanggaran() {
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(data) {
                const select = document.getElementById("jenis");
                if (!select) return;
                select.innerHTML = '<option value="" disabled selected>-- Pilih Jenis Pelanggaran --</option>';
                const groups = {};
                data.forEach(item => {
                    if (!groups[item.kategori]) groups[item.kategori] = [];
                    groups[item.kategori].push(item);
                });
                for (const kategori in groups) {
                    const optgroup = document.createElement("optgroup");
                    optgroup.label = kategori;
                    groups[kategori].forEach(item => {
                        const option = document.createElement("option");
                        option.value = `${item.poin}|${item.jenis}`;
                        option.text = `${item.jenis} (${item.poin} Poin)`;
                        optgroup.appendChild(option);
                    });
                    select.appendChild(optgroup);
                }
            }).getJenisPelanggaranList();
        }
    }

    function updateJabatan() {
        const nama = document.getElementById("nama").value;
        const jabatanInput = document.getElementById("jabatan");
        const find = listFungsionaris.find(f => f.nama === nama);
        if (find) jabatanInput.value = find.jabatan;
        else jabatanInput.value = "";
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('lastActivity');
        document.getElementById("loginUser").value = "";
        document.getElementById("loginPass").value = "";
        document.getElementById("mainPage").classList.add("hidden");
        document.getElementById("loginPage").classList.remove("hidden");
    }

    function showStatus(message, isError = false) {
        const alertBox = document.getElementById("statusAlert");
        alertBox.classList.remove("hidden", "bg-green-100", "text-green-700", "bg-red-100", "text-red-700");
        if(isError) alertBox.classList.add("bg-red-100", "text-red-700");
        else alertBox.classList.add("bg-green-100", "text-green-700");
        alertBox.innerText = message;
        alertBox.classList.remove("hidden");
        setTimeout(() => alertBox.classList.add("hidden"), 4000);
    }

    function simpan() {
        const btn = document.getElementById("btnSimpan");
        const nama = document.getElementById("nama").value;
        const jabatan = document.getElementById("jabatan").value;
        const jenisRaw = document.getElementById("jenis").value; 
        const ket = document.getElementById("keterangan").value;
        if(!nama || !jabatan || !jenisRaw) return showStatus("Mohon lengkapi form wajib!", true);
        const dataSplit = jenisRaw.split("|");
        const poin = dataSplit[0];
        const jenis = dataSplit[1];
        btn.disabled = true;
        btn.innerHTML = `Menyimpan...`;
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function() {
                showStatus("Data berhasil disimpan!");
                document.getElementById("formPelanggaran").reset();
                btn.disabled = false; btn.innerHTML = `<span>Simpan Data</span>`;
                loadData();
            }).simpanPelanggaran(nama, jabatan, jenis, poin, ket);
        }
    }

    function loadData() {
        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(function(data){
                renderTable(data);
            }).getData();
        }
    }

    // FUNGSI AKSES CEPAT FUNGSIONARIS
    function loginCepatFungsionaris() {
        document.getElementById("loginUser").value = "FungsionarisDPM";
        document.getElementById("loginPass").value = "DPMVOKASI";
        prosesLogin();
    }
</script>
